name: "Rust builds"
description: "Builds and tests rust code"
inputs:
    toolchain:
        required: true
        description: "the Rust toolchain to use"
    shared-key:
        required: false
        description: "shared cache key for Swatinem/rust-cache"
        default: ""
    save-if:
        required: false
        description: "whether to save the cache (e.g. only on main)"
        default: "true"

runs:
    using: "composite"
    steps:
        - uses: dtolnay/rust-toolchain@master
          with:
              toolchain: ${{ inputs.toolchain }}
        - uses: Swatinem/rust-cache@v2
          with:
              shared-key: ${{ inputs.shared-key }}
              save-if: ${{ inputs.save-if }}
        - name: Enable perf_event_open and kallsyms for tests
          if: runner.os == 'Linux'
          shell: bash
          run: |
              sudo sysctl kernel.perf_event_paranoid=1
              sudo sysctl kernel.kptr_restrict=0
        - name: Build and test
          shell: bash
          env:
              RUSTFLAGS: "--cfg tokio_unstable"
          run: |
              if [ "${{ inputs.toolchain }}" = nightly ]; then
                  rm -fv Cargo.lock
              fi
              if [ "$RUNNER_OS" = "Linux" ]; then
                  # Raise locked-memory limit for large perf ring buffers
                  sudo prlimit --pid $$ --memlock=unlimited:unlimited
              fi
              cargo test --all-targets --all-features
