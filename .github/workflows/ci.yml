name: CI
on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

env:
  STABLE_TOOLCHAIN: "1.94.1"

jobs:
  fmt:
    name: Cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-ubuntu
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo fmt --all -- --check

  clippy:
    name: Cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.STABLE_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable-ubuntu
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run clippy check
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          RUSTFLAGS: "--cfg tokio_unstable"

  build:
    name: Build (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: ["1.94.1", nightly]
    env:
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-build
        with:
          toolchain: ${{ matrix.toolchain }}
          shared-key: ${{ matrix.toolchain }}-${{ matrix.os }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

  check-docs:
    name: Check docs.rs
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'pull_request'
        && !startsWith(github.head_ref, 'release-')
        && !startsWith(github.head_ref, 'release/')
      }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-docs
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-ubuntu
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: sudo apt-get update && sudo apt-get install -y jq
      - run: cargo install cargo-docs-rs
      - run: ./scripts/check-docsrs.sh

  trace-integrity:
    name: Trace Integrity & Analysis
    runs-on: ubuntu-latest
    services:
      dynamodb-local:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable-ubuntu
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable perf_event_open and kallsyms for tests
        run: |
          sudo sysctl kernel.perf_event_paranoid=1
          sudo sysctl kernel.kptr_restrict=0
      - run: scripts/e2e-trace-tests.sh

  package:
    name: Cargo package
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'pull_request'
        && !startsWith(github.head_ref, 'release-')
        && !startsWith(github.head_ref, 'release/')
      }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable-ubuntu
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Verify all publishable crates package cleanly
        env:
          RUSTFLAGS: "--cfg tokio_unstable"
        run: |
          for crate in dial9-trace-format-derive dial9-trace-format dial9-perf-self-profile dial9-macro dial9-tokio-telemetry dial9-viewer; do
            echo "::group::cargo package -p $crate"
            cargo package -p "$crate"
            echo "::endgroup::"
          done

  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [fmt, clippy, build, check-docs, trace-integrity, package]
    if: always()
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs failed or were cancelled"
            exit 1
          fi
