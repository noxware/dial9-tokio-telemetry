[workspace]
git_release_enable = true
changelog_update = false
semver_check = true
pr_body = """
{% for release in releases %}
{% if release.title %}
### {{release.title}}
{% endif %}
Package: `{{release.package}}` {{release.previous_version}} -> {{release.next_version}}
{% if release.changelog %}
Changes:
{{release.changelog}}
{% endif %}
{% endfor %}
---

> **Maintainer note:** CI does not trigger automatically on this PR (GitHub limitation with `GITHUB_TOKEN`-created PRs). **Close and reopen** this PR to trigger CI before merging.
"""

[[package]]
name = "dial9-tokio-telemetry"
changelog_update = true
changelog_path = "CHANGELOG.md"
changelog_include = [
    "dial9-macro",
    "dial9-perf-self-profile",
    "dial9-trace-format",
    "dial9-trace-format-derive",
    "dial9-viewer",
    "dial9",
]

[[package]]
name = "dial9-macro"
changelog_update = false

[[package]]
name = "dial9-perf-self-profile"
changelog_update = false

[[package]]
name = "dial9-trace-format"
changelog_update = false
version_group = "trace-format"

[[package]]
name = "dial9-trace-format-derive"
changelog_update = false
version_group = "trace-format"

[[package]]
name = "dial9-viewer"
changelog_update = false

[[package]]
name = "dial9"
changelog_update = false
